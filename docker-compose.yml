version: "3.9"

services:

  mysql:
    image: mysql:8
    container_name: task-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: taskdb

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10


  api:
    build: .
    container_name: task-api
    restart: always

    ports:
      - "8080:8080"

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: taskdb

    depends_on:
      - mysql


volumes:
  mysql_data: